<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trail Run Training</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E85D2F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trail Train">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --orange: #E85D2F;
    --orange-dark: #C44A20;
    --orange-light: #FF7A4D;
    --bg: #0F0F0F;
    --surface: #1A1A1A;
    --surface2: #242424;
    --surface3: #2E2E2E;
    --text: #F0EDE8;
    --text-muted: #888;
    --text-dim: #555;
    --green: #4CAF7D;
    --blue: #5B9BD5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HOME SCREEN */
  .home {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .home-header {
    padding: 48px 24px 24px;
    background: linear-gradient(180deg, #1A0A05 0%, var(--bg) 100%);
  }

  .home-eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .home-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 0.9;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .home-title span { color: var(--orange); }

  .home-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 12px;
    font-weight: 300;
  }

  .week-pills {
    display: flex;
    gap: 8px;
    padding: 20px 24px 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .week-pills::-webkit-scrollbar { display: none; }

  .week-pill {
    flex-shrink: 0;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--surface3);
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.2s;
  }
  .week-pill.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
  }

  .sessions-list {
    flex: 1;
    padding: 8px 24px 100px;
  }

  .phase-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 24px 0 12px;
    font-weight: 500;
  }

  .session-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    border: 1px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .session-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-accent, var(--orange));
    border-radius: 3px 0 0 3px;
  }
  .session-card:active { transform: scale(0.98); background: var(--surface2); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .card-type {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
    color: var(--text);
  }

  .card-badge {
    background: var(--surface3);
    border-radius: 8px;
    padding: 6px 10px;
    text-align: center;
    flex-shrink: 0;
  }
  .badge-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text);
    line-height: 1;
  }
  .badge-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

  .card-meta {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .meta-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--card-accent, var(--orange));
    flex-shrink: 0;
  }

  /* DETAIL SCREEN */
  .detail {
    min-height: 100vh;
    display: none;
    flex-direction: column;
  }

  .detail-header {
    padding: 48px 24px 20px;
    background: linear-gradient(180deg, #1A0A05 0%, var(--bg) 80%);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--orange);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 16px;
    width: fit-content;
  }
  .back-arrow {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(232,93,47,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .detail-type {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--orange);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .detail-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 16px;
  }

  .phase-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .phase-tabs::-webkit-scrollbar { display: none; }

  .phase-tab {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--surface3);
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.2s;
  }
  .phase-tab.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
  }
  .phase-tab .tab-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .detail-content {
    padding: 16px 24px 100px;
    flex: 1;
  }

  .block-section {
    margin-bottom: 20px;
  }

  .block-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .block-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(232,93,47,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .block-info {}
  .block-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
  }
  .block-time {
    font-size: 12px;
    color: var(--orange);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 1px;
  }

  .exercises-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .exercise-item {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--surface2);
  }

  .exercise-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }

  .exercise-name {
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }

  .exercise-sets {
    flex-shrink: 0;
    background: var(--surface3);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--orange);
    white-space: nowrap;
  }

  .exercise-note {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .video-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(232,93,47,0.12);
    border-radius: 20px;
    color: var(--orange-light);
    font-size: 11px;
    font-weight: 500;
    text-decoration: none;
    border: 1px solid rgba(232,93,47,0.25);
    transition: background 0.15s;
  }
  .video-btn:hover { background: rgba(232,93,47,0.2); }
  .video-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

  .pause-note {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(91,155,213,0.08);
    border-radius: 10px;
    border: 1px solid rgba(91,155,213,0.15);
    font-size: 12px;
    color: var(--blue);
    margin-top: 8px;
  }

  .section-divider {
    height: 1px;
    background: var(--surface2);
    margin: 20px 0;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--surface2);
    display: flex;
    padding: 12px 0 20px;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px;
  }
  .nav-icon {
    font-size: 20px;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s;
  }
  .nav-item.active .nav-icon { opacity: 1; transform: scale(1.1); }
  .nav-label {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .nav-item.active .nav-label { color: var(--orange); }

  /* Animations */
  .fade-in { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; }

  /* Progress dots */
  .progress-bar {
    display: flex;
    gap: 4px;
    margin-top: 12px;
  }
  .prog-dot {
    height: 3px;
    flex: 1;
    border-radius: 3px;
    background: var(--surface3);
  }
  .prog-dot.done { background: var(--orange); }
  .prog-dot.current { background: var(--orange-light); }

  /* Types colors */
  .type-hiper { --card-accent: #9B59B6; }
  .type-desc  { --card-accent: #3498DB; }
  .type-max   { --card-accent: #E85D2F; }
  .type-pot   { --card-accent: #F39C12; }

  .type-hiper .card-type { color: #9B59B6; }
  .type-desc  .card-type { color: #3498DB; }
  .type-max   .card-type { color: var(--orange); }
  .type-pot   .card-type { color: #F39C12; }

  .detail-hiper .detail-type { color: #9B59B6; }
  .detail-desc  .detail-type { color: #3498DB; }
  .detail-max   .detail-type { color: var(--orange); }
  .detail-pot   .detail-type { color: #F39C12; }

  /* ── BLOCK TIMER ── */
  .block-timer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    background: var(--surface2);
    border-radius: 14px;
    padding: 10px 14px;
  }
  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--text);
    min-width: 90px;
    line-height: 1;
    transition: color 0.3s;
  }
  .timer-display.running { color: var(--orange-light); }
  .timer-display.warning { color: #F39C12; }
  .timer-display.done    { color: var(--green); }

  .timer-btns {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-left: auto;
  }
  .timer-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: transform 0.1s, opacity 0.1s;
    flex-shrink: 0;
  }
  .timer-btn:active { transform: scale(0.9); }
  .btn-play  { background: var(--orange); color: white; }
  .btn-pause { background: var(--surface3); color: var(--text); }
  .btn-reset { background: var(--surface3); color: var(--text-muted); font-size: 13px; }

  .timer-progress-ring {
    position: relative;
    width: 44px; height: 44px;
    flex-shrink: 0;
  }
  .timer-progress-ring svg { transform: rotate(-90deg); }
  .ring-bg   { fill: none; stroke: var(--surface3); stroke-width: 3; }
  .ring-fill { fill: none; stroke: var(--orange); stroke-width: 3;
               stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }

  /* ── WEIGHT NOTES ── */
  .weight-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .weight-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 5px 10px;
    border: 1px solid var(--surface3);
    flex: 1;
    min-width: 120px;
    transition: border-color 0.2s;
  }
  .weight-input-wrap:focus-within {
    border-color: var(--orange);
  }
  .weight-icon { font-size: 13px; flex-shrink: 0; }
  .weight-input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    width: 100%;
    min-width: 0;
  }
  .weight-input::placeholder { color: var(--text-dim); font-size: 12px; }
  .weight-save-btn {
    background: rgba(76,175,125,0.15);
    border: 1px solid rgba(76,175,125,0.3);
    border-radius: 8px;
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .weight-save-btn:active { background: rgba(76,175,125,0.3); }
  .weight-saved-tag {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--green);
    font-weight: 500;
  }
  .weight-saved-tag.visible { display: flex; }

  /* ── WEIGHT HISTORY MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 24px 40px;
    width: 100%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px;
    border-radius: 2px;
    background: var(--surface3);
    margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .modal-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
  .history-entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--surface2);
  }
  .history-entry:last-child { border-bottom: none; }
  .history-date { font-size: 11px; color: var(--text-dim); }
  .history-val { font-size: 14px; font-weight: 600; color: var(--text); }
  .history-del { font-size: 14px; cursor: pointer; color: var(--text-dim); padding: 4px 8px; }
  .history-empty { font-size: 13px; color: var(--text-dim); text-align: center; padding: 20px 0; }
  .modal-close-btn {
    width: 100%;
    padding: 12px;
    background: var(--surface2);
    border: none;
    border-radius: 12px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 16px;
  }

  /* floating timer pill when scrolled */
  .floating-timer {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--orange);
    color: white;
    border-radius: 24px;
    padding: 8px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    z-index: 50;
    display: none;
    box-shadow: 0 4px 20px rgba(232,93,47,0.5);
    pointer-events: none;
  }
  .floating-timer.visible { display: block; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-eyebrow">🏔️ Trail Running</div>
    <div class="home-title">TRAIN<span>ING</span><br>PLAN</div>
    <div class="home-subtitle">4 semanas · 3 días por semana · Trail Running</div>
  </div>

  <div class="week-pills">
    <div class="week-pill active" onclick="filterWeek('all')">Todo</div>
    <div class="week-pill" onclick="filterWeek('max')">Sem 1 · Fuerza Máx</div>
    <div class="week-pill" onclick="filterWeek('pot')">Sem 2 · Potencia</div>
    <div class="week-pill" onclick="filterWeek('hiper')">Sem 3 · Hipertrofia</div>
    <div class="week-pill" onclick="filterWeek('desc')">Sem 4 · Resistencia</div>
  </div>

  <div class="sessions-list" id="sessions-list"></div>
</div>

<!-- DETAIL SCREEN -->
<div id="screen-detail" class="screen">
  <div class="detail-header" id="detail-header"></div>
  <div class="detail-content" id="detail-content"></div>
</div>

<!-- Weight history modal -->
<div class="modal-overlay" id="weight-modal" onclick="closeWeightModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-ex-name">Ejercicio</div>
    <div class="modal-subtitle" id="modal-ex-sub">Historial de cargas</div>
    <div id="modal-history-list"></div>
    <button class="modal-close-btn" onclick="closeWeightModal()">Cerrar</button>
  </div>
</div>

<!-- Floating timer pill -->
<div class="floating-timer" id="floating-timer">00:00</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="goHome()">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Inicio</div>
  </div>
  <div class="nav-item" onclick="">
    <div class="nav-icon">📅</div>
    <div class="nav-label">Semana</div>
  </div>
  <div class="nav-item" onclick="">
    <div class="nav-icon">📊</div>
    <div class="nav-label">Progreso</div>
  </div>
</div>

      {

function renderHome() {
  const list = document.getElementById('sessions-list');
  list.innerHTML = '';

  const weeksToShow = currentFilter === 'all'
    ? WEEKS
    : WEEKS.filter(w => w.key === currentFilter);

  weeksToShow.forEach(week => {
    const workouts = WORKOUTS.filter(w => w.type === week.key);
    if (!workouts.length) return;

    // Week header block
    const weekHeader = document.createElement('div');
    weekHeader.className = 'week-header fade-in';
    weekHeader.style.cssText = `
      margin: 24px 0 14px;
      padding: 16px 18px;
      background: var(--surface);
      border-radius: 16px;
      border-left: 4px solid ${week.color};
      display: flex; align-items: center; gap: 14px;
    `;
    weekHeader.innerHTML = `
      <div style="width:44px;height:44px;border-radius:12px;background:${week.color}22;
        display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">
        ${week.icon}
      </div>
      <div>
        <div style="font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
          color:${week.color};font-weight:600;margin-bottom:2px;">${week.label}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;
          color:var(--text);line-height:1;">${week.focus}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">
          ${workouts.length} sesión${workouts.length !== 1 ? 'es' : ''} · 3 días/semana
        </div>
      </div>
    `;
    list.appendChild(weekHeader);

    workouts.forEach((w, idx) => {
      const card = document.createElement('div');
      card.className = `session-card type-${w.type} fade-in`;
      card.style.animationDelay = `${idx * 0.05}s`;
      card.onclick = () => openWorkout(w.id);

      const totalBlocks = w.phases.reduce((a, p) => a + p.blocks.length, 0);

      card.innerHTML = `
        <div class="card-top">
          <div>
            <div class="card-type" style="color:${week.color}">
              Día ${idx + 1}
            </div>
            <div class="card-name">${w.name}</div>
          </div>
          <div class="card-badge">
            <div class="badge-num">${w.totalMin}'</div>
            <div class="badge-label">min</div>
          </div>
        </div>
        <div class="card-meta">
          <div class="meta-item"><div class="meta-dot" style="background:${week.color}"></div>${w.phases.length} fases</div>
          <div class="meta-item"><div class="meta-dot" style="background:${week.color}"></div>${totalBlocks} bloques</div>
        </div>
      `;
      list.appendChild(card);
    });
  });
}

function filterWeek(type) {
  currentFilter = type;
  document.querySelectorAll('.week-pill').forEach((p, i) => {
    const types = ['all','max','pot','hiper','desc'];
    p.classList.toggle('active', types[i] === type);
  });
  renderHome();
}

function openWorkout(id) {
  currentWorkout = WORKOUTS.find(w => w.id === id);
  currentPhaseIdx = 0;
  renderDetail();
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-detail').classList.add('active');
  window.scrollTo(0,0);
}

function goHome() {
  document.getElementById('screen-detail').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
}

// ══════════════════════════════════════════════
// TIMER STATE
// ══════════════════════════════════════════════
const timers = {}; // key: `${workoutId}-${phaseIdx}-${blockIdx}`

function timerKey(bi) {
  return `${currentWorkout.id}-${currentPhaseIdx}-${bi}`;
}

function getTimer(bi) {
  const k = timerKey(bi);
  if (!timers[k]) {
    const phase = currentWorkout.phases[currentPhaseIdx];
    const block = phase.blocks[bi];
    const mins = parseInt(block.time) || 5;
    timers[k] = { total: mins * 60, remaining: mins * 60, running: false, interval: null };
  }
  return timers[k];
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2,'0');
  const s = (sec % 60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

function updateTimerUI(bi) {
  const t = getTimer(bi);
  const disp = document.getElementById(`timer-disp-${bi}`);
  const ring = document.getElementById(`ring-fill-${bi}`);
  const btnPlay = document.getElementById(`btn-play-${bi}`);
  const floating = document.getElementById('floating-timer');

  if (!disp) return;

  disp.textContent = fmtTime(t.remaining);

  // color states
  const pct = t.remaining / t.total;
  disp.className = 'timer-display' + (t.running ? ' running' : '') + (pct <= 0.25 && t.remaining > 0 ? ' warning' : '') + (t.remaining === 0 ? ' done' : '');

  // ring
  const r = 18, circ = 2 * Math.PI * r;
  const progress = t.remaining / t.total;
  ring.style.strokeDasharray = circ;
  ring.style.strokeDashoffset = circ * (1 - progress);
  ring.style.stroke = t.remaining === 0 ? 'var(--green)' : pct <= 0.25 ? '#F39C12' : 'var(--orange)';

  // play/pause icon
  btnPlay.textContent = t.running ? '⏸' : '▶';
  btnPlay.className = `timer-btn ${t.running ? 'btn-pause' : 'btn-play'}`;

  // floating pill — show if any timer running
  const anyRunning = Object.values(timers).find(t => t.running);
  if (anyRunning) {
    floating.textContent = fmtTime(anyRunning.remaining);
    floating.classList.add('visible');
  } else {
    floating.classList.remove('visible');
  }
}

function toggleTimer(bi) {
  const t = getTimer(bi);
  if (t.remaining === 0) return;

  if (t.running) {
    clearInterval(t.interval);
    t.running = false;
    updateTimerUI(bi);
  } else {
    // pause all others
    Object.entries(timers).forEach(([k, ot]) => {
      if (ot.running) {
        clearInterval(ot.interval);
        ot.running = false;
        const otBi = parseInt(k.split('-')[2]);
        updateTimerUI(otBi);
      }
    });

    t.running = true;
    t.interval = setInterval(() => {
      t.remaining--;
      updateTimerUI(bi);
      if (t.remaining <= 0) {
        clearInterval(t.interval);
        t.running = false;
        t.remaining = 0;
        updateTimerUI(bi);
        // vibrate if supported
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }
    }, 1000);
    updateTimerUI(bi);
  }
}

function resetTimer(bi) {
  const t = getTimer(bi);
  clearInterval(t.interval);
  t.running = false;
  t.remaining = t.total;
  updateTimerUI(bi);
}

// ══════════════════════════════════════════════
// WEIGHT NOTES STATE  (persisted in localStorage)
// ══════════════════════════════════════════════
function weightKey(exName) {
  return 'w_' + exName.replace(/\s+/g,'_').toLowerCase().slice(0,40);
}

function getWeightHistory(exName) {
  try { return JSON.parse(localStorage.getItem(weightKey(exName))) || []; }
  catch { return []; }
}

function saveWeight(exName, value) {
  if (!value.trim()) return;
  const hist = getWeightHistory(exName);
  const today = new Date().toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'2-digit' });
  hist.unshift({ date: today, val: value.trim() });
  // keep last 10
  if (hist.length > 10) hist.pop();
  localStorage.setItem(weightKey(exName), JSON.stringify(hist));
}

function deleteWeight(exName, idx) {
  const hist = getWeightHistory(exName);
  hist.splice(idx, 1);
  localStorage.setItem(weightKey(exName), JSON.stringify(hist));
  openWeightModal(exName); // re-render
}

function getLastWeight(exName) {
  const h = getWeightHistory(exName);
  return h.length ? h[0].val : null;
}

function openWeightModal(exName) {
  const hist = getWeightHistory(exName);
  document.getElementById('modal-ex-name').textContent = exName;
  document.getElementById('modal-ex-sub').textContent = `${hist.length} registro${hist.length !== 1 ? 's' : ''} guardado${hist.length !== 1 ? 's' : ''}`;

  const listEl = document.getElementById('modal-history-list');
  if (!hist.length) {
    listEl.innerHTML = `<div class="history-empty">Sin registros aún — guardá tu primera carga arriba.</div>`;
  } else {
    listEl.innerHTML = hist.map((h, i) => `
      <div class="history-entry">
        <div>
          <div class="history-val">${h.val}</div>
          <div class="history-date">${h.date}</div>
        </div>
        <div class="history-del" onclick="deleteWeight('${exName.replace(/'/g,"\\'")}', ${i})">🗑</div>
      </div>
    `).join('');
  }
  document.getElementById('weight-modal').classList.add('open');
  window._currentModalEx = exName;
}

function closeWeightModal(e) {
  if (e && e.target !== document.getElementById('weight-modal')) return;
  document.getElementById('weight-modal').classList.remove('open');
}

function handleWeightSave(exName, inputId, savedId) {
  const input = document.getElementById(inputId);
  const savedTag = document.getElementById(savedId);
  if (!input.value.trim()) return;
  saveWeight(exName, input.value.trim());
  savedTag.classList.add('visible');
  setTimeout(() => savedTag.classList.remove('visible'), 2000);
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderDetail() {
  const w = currentWorkout;
  const header = document.getElementById('detail-header');
  const content = document.getElementById('detail-content');

  header.className = `detail-header detail-${w.type}`;

  const tabs = w.phases.map((p, i) => `
    <div class="phase-tab ${i === currentPhaseIdx ? 'active' : ''}" onclick="switchPhase(${i})">
      <span>${p.icon}</span>
      <span class="tab-time">${p.time}</span>
      <span>${p.name}</span>
    </div>
  `).join('');

  header.innerHTML = `
    <div class="back-btn" onclick="goHome()">
      <div class="back-arrow">←</div>
      Volver
    </div>
    <div class="detail-type">${typeIcons[w.type]} ${w.typeName} · ${w.date}</div>
    <div class="detail-title">${w.name}</div>
    <div class="phase-tabs">${tabs}</div>
  `;

  const phase = w.phases[currentPhaseIdx];
  let html = '';

  phase.blocks.forEach((block, bi) => {
    const t = getTimer(bi);
    const r = 18, circ = 2 * Math.PI * r;
    const progress = t.remaining / t.total;
    const offset = circ * (1 - progress);

    html += `<div class="block-section fade-in">`;

    // Block timer row
    html += `
      <div class="block-timer-row">
        <div class="timer-progress-ring">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle class="ring-bg" cx="22" cy="22" r="${r}"/>
            <circle class="ring-fill" id="ring-fill-${bi}" cx="22" cy="22" r="${r}"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
          </svg>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px">${block.name}</div>
          <div class="timer-display ${t.running ? 'running' : ''}" id="timer-disp-${bi}">${fmtTime(t.remaining)}</div>
        </div>
        <div class="timer-btns">
          <button class="timer-btn btn-reset" id="btn-reset-${bi}" onclick="resetTimer(${bi})">↺</button>
          <button class="timer-btn ${t.running ? 'btn-pause' : 'btn-play'}" id="btn-play-${bi}" onclick="toggleTimer(${bi})">${t.running ? '⏸' : '▶'}</button>
        </div>
      </div>
    `;

    if (block.note) {
      html += `<div class="exercise-note" style="margin-bottom:12px;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:8px;">📌 ${block.note}</div>`;
    }

    html += `<div class="exercises-list">`;
    block.exercises.forEach((ex, ei) => {
      const inputId = `wi-${bi}-${ei}`;
      const savedId = `ws-${bi}-${ei}`;
      const lastW = getLastWeight(ex.name);
      const exNameSafe = ex.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');

      html += `<div class="exercise-item">
        <div class="exercise-top">
          <div class="exercise-name">${ex.name}</div>
          ${ex.sets ? `<div class="exercise-sets">${ex.sets}</div>` : ''}
        </div>
        ${ex.note ? `<div class="exercise-note">💬 ${ex.note}</div>` : ''}
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:6px;">
          ${ex.url ? `<a class="video-btn" href="${ex.url}" target="_blank">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            Ver video
          </a>` : ''}
          ${lastW ? `<span style="font-size:11px;color:var(--text-muted);cursor:pointer;" onclick="openWeightModal('${exNameSafe}')">🏋️ ${lastW}</span>` : ''}
        </div>
        <div class="weight-row">
          <div class="weight-input-wrap">
            <span class="weight-icon">🏋️</span>
            <input class="weight-input" id="${inputId}" type="text"
              placeholder="${lastW ? 'Ej: ' + lastW : 'Ej: 20kg · 2 series'}"
              onkeydown="if(event.key==='Enter'){handleWeightSave('${exNameSafe}','${inputId}','${savedId}');this.blur();}"/>
          </div>
          <button class="weight-save-btn" onclick="handleWeightSave('${exNameSafe}','${inputId}','${savedId}')">Guardar</button>
          <div class="weight-saved-tag" id="${savedId}">✓ Guardado</div>
        </div>
        ${lastW ? `<div style="font-size:11px;color:var(--text-dim);margin-top:4px;cursor:pointer;" onclick="openWeightModal('${exNameSafe}')">Ver historial →</div>` : ''}
      </div>`;
    });
    html += `</div>`;

    if (block.pause) {
      html += `<div class="pause-note">⏸ <strong>Pausa:</strong> ${block.pause}</div>`;
    }

    if (bi < phase.blocks.length - 1) {
      html += `<div class="section-divider"></div>`;
    }
    html += `</div>`;
  });

  content.innerHTML = html;
  content.scrollTop = 0;

  // Init ring visuals
  phase.blocks.forEach((_, bi) => updateTimerUI(bi));
}

function switchPhase(idx) {
  // stop any running timers for current phase
  const phase = currentWorkout.phases[currentPhaseIdx];
  phase.blocks.forEach((_, bi) => {
    const t = getTimer(bi);
    if (t.running) { clearInterval(t.interval); t.running = false; }
  });
  currentPhaseIdx = idx;
  renderDetail();
}

// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('SW registered'))
      .catch(err => console.log('SW error:', err));
  });
}

// Init
renderHome();
</script>
